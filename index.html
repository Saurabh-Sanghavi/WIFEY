<!DOCTYPE html>
<html>

<head>
    <title>WIFEY ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ffd6e7, #ffc2d1, #ffe5ec);
            height: 100vh;
            font-family: Arial;
            text-align: center;
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            color: pink;
            font-size: 22px;
            animation: floatUp 7s linear infinite;
            z-index: 1;
            opacity: 0.8;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }

        /* Container */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            z-index: 2;
        }

        /* Doors */
        .door {
            position: absolute;
            width: 50%;
            height: 100%;
            top: 0;
            background: #ffb6c1;
            z-index: 5;
            transition: 3s ease-in-out;
        }

        .left-door { left: 0; }
        .right-door { right: 0; }

        .open .left-door { transform: translateX(-100%); }
        .open .right-door { transform: translateX(100%); }

        /* Content */
        .content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 2s;
        }

        .open .content {
            opacity: 1;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 60px;
            color: #ff4f87;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .photo {
            width: 280px;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        button {
            margin-top: 25px;
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #ff4f87;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        /* IDEA 4 */
        #idea4 {
            display: none;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 3;
            position: relative;
        }

        .bar-container {
            width: 80%;
            max-width: 400px;
            height: 25px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            margin-top: 20px;
        }

        #bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg,#ff4f87,#ff9a9e);
            transition: 6s ease; /* ⬅️ SLOWER LOVE METER */
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #ff4f87;
            opacity: 0;
            transition: 1.5s;
        }

    </style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" src="https://files.catbox.moe/0t48uw.mp3"></audio>

<!-- FLOATING HEARTS -->
<script>
setInterval(() => {

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 7000);

}, 250);
</script>

<!-- MAIN -->
<div class="container" id="container">

    <div class="door left-door"></div>
    <div class="door right-door"></div>

    <div class="content">

        <h1>Welcome To My Heart ❤️</h1>

        <img class="photo"
        src="https://i.8upload.com/image/9c1ba2421492b403/1775055548027.jpg">

        <button onclick="goNext()">NEXT ➜</button>

    </div>

</div>

<!-- IDEA 4 -->
<div id="idea4" style="display:none;">

    <h1 style="color:#ff4f87; margin-top:100px;">
        Checking Love Level 💖
    </h1>

    <div class="bar-container">
        <div id="bar"></div>
    </div>

    <div id="result">
        Result: ❤️ LOVE OVERFLOW DETECTED 😏
    </div>

</div>

<script>

function openDoors() {
    document.getElementById("container").classList.add("open");
    document.getElementById("music").play();
}

// auto open
setTimeout(openDoors, 500);

// NEXT
function goNext() {

    document.getElementById("container").style.display = "none";
    document.getElementById("idea4").style.display = "flex";

    // slower suspense loading
    setTimeout(() => {
        document.getElementById("bar").style.width = "100%";
    }, 800);

    setTimeout(() => {
        document.getElementById("result").style.opacity = "1";
    }, 6500); // ⬅️ MORE TIME ADDED

}

</script>

</body>
</html>
