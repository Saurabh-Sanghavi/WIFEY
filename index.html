<!DOCTYPE html>
<html>

<head>
    <title>Welcome To My Heart ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ffd6e7, #ffc2d1, #ffe5ec);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .door {
            position: absolute;
            width: 50%;
            height: 100%;
            background: #ffb6c1;
            top: 0;
            z-index: 5;
            transition: 3s ease-in-out;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.5);
        }

        .left-door {
            left: 0;
            border-right: 2px solid white;
        }

        .right-door {
            right: 0;
            border-left: 2px solid white;
        }

        .open .left-door {
            transform: translateX(-100%);
        }

        .open .right-door {
            transform: translateX(100%);
        }

        .content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .open .content {
            opacity: 1;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 65px;
            color: #ff4f87;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .photo {
            width: 280px;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        button {
            position: absolute;
            z-index: 10;
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #ff4f87;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* hearts */
        .heart {
            position: absolute;
            color: pink;
            font-size: 22px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }

        /* IDEA 4 */
        #idea4 {
            display: none;
            position: absolute;
            width: 100%;
            height: 100vh;
            top: 0;
            left: 0;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #ffd6e7, #ffc2d1, #ffe5ec);
            z-index: 20;
        }

        #barContainer {
            width: 80%;
            max-width: 400px;
            height: 25px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg,#ff4f87,#ff9a9e);
            transition: 7s ease;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #ff4f87;
            opacity: 0;
            transition: 1.5s;
        }

    </style>
</head>

<body>

<audio id="music" src="https://files.catbox.moe/0t48uw.mp3"></audio>

<!-- ENTER BUTTON -->
<button onclick="openDoors()" id="enterBtn">ENTER ❤️</button>

<div class="container" id="container">

    <div class="door left-door"></div>
    <div class="door right-door"></div>

    <div class="content">

        <h1>Welcome To My Heart ❤️</h1>

        <img class="photo"
        src="https://i.8upload.com/image/9c1ba2421492b403/1775055548027.jpg">

        <!-- NEXT BUTTON (hidden initially) -->
        <button id="nextBtn" onclick="goNext()" style="display:none; margin-top:300px;">
            NEXT ➜
        </button>

    </div>

</div>

<!-- IDEA 4 -->
<div id="idea4">

    <h1 style="font-family:'Pacifico',cursive; color:#ff4f87;">
        Checking Love Level 💖
    </h1>

    <div id="barContainer">
        <div id="bar"></div>
    </div>

    <div id="result">
        ❤️ LOVE OVERFLOW DETECTED 😏
    </div>

</div>

<script>

function openDoors() {

    document.getElementById("container").classList.add("open");

    document.getElementById("enterBtn").style.display = "none";

    document.getElementById("music").play();

    // show NEXT after 15 sec
    setTimeout(() => {
        document.getElementById("nextBtn").style.display = "block";
    }, 15000);

}

// floating hearts
setInterval(() => {

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);

}, 300);

// NEXT BUTTON FUNCTION (FIXED)
function goNext() {

    document.getElementById("container").style.display = "none";
    document.getElementById("idea4").style.display = "flex";

    setTimeout(() => {
        document.getElementById("bar").style.width = "100%";
    }, 800);

    setTimeout(() => {
        document.getElementById("result").style.opacity = "1";
    }, 7000);

}

</script>

</body>

</html>
