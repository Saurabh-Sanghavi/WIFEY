<!DOCTYPE html>
<html>

<head>
    <title>Welcome To My Heart ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #ffd6e7, #ffc2d1, #ffe5ec);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Center Container */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* Doors */
        .door {
            position: absolute;
            width: 50%;
            height: 100%;
            background: #ffb6c1;
            top: 0;
            z-index: 5;
            transition: 3s ease-in-out;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.5);
        }

        .left-door {
            left: 0;
            border-right: 2px solid white;
        }

        .right-door {
            right: 0;
            border-left: 2px solid white;
        }

        /* Open animation */
        .open .left-door {
            transform: translateX(-100%);
        }

        .open .right-door {
            transform: translateX(100%);
        }

        /* Content */
        .content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .open .content {
            opacity: 1;
        }

        /* Welcome Text */
        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 65px;
            color: #ff4f87;
            text-shadow: 0 5px 15px rgba(255,105,180,0.5);
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Photo */
        .photo {
            width: 280px;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            animation: fadeIn 3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Enter Button */
        button {
            position: absolute;
            z-index: 10;
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #ff4f87;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            color: pink;
            animation: floatUp 6s linear infinite;
            font-size: 24px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh);
                opacity: 1;
            }

            100% {
                transform: translateY(-120px);
                opacity: 0;
            }
        }

    </style>
</head>

<body>

    <!-- Music -->
    <audio id="music" src="https://files.catbox.moe/0t48uw.mp3"></audio>

    <!-- ENTER BUTTON -->
    <button onclick="openDoors()">
        ENTER ❤️
    </button>

    <div class="container" id="container">

        <!-- Doors -->
        <div class="door left-door"></div>
        <div class="door right-door"></div>

        <!-- Main Content -->
        <div class="content">

            <h1>
                Welcome To My Heart ❤️
            </h1>

            <img class="photo"
            src="https://i.8upload.com/image/9c1ba2421492b403/1775055548027.jpg"
            alt="MY BAACHA🎀">

        </div>

    </div>

    <script>

        // Open doors
        function openDoors() {

            document.getElementById("container").classList.add("open");

            // Hide button
            document.querySelector("button").style.display = "none";

            // Play music
            document.getElementById("music").play();

        }

        // Floating hearts
        setInterval(() => {

            let heart = document.createElement("div");

            heart.className = "heart";

            heart.innerHTML = "💖";

            heart.style.left = Math.random() * 100 + "vw";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);

        }, 300);

    </script>

</body>

</html>
